<!DOCTYPE html>
<html>
<body>

<select id="eventType">

<option value="Sports">
Sports
</option>

<option value="Music">
Music
</option>

<option value="Dance">
Dance
</option>

</select>

<button onclick="savePref()">
Save
</button>

<button onclick="clearPref()">
Clear Preferences
</button>

<script>

function savePref(){

let event=
document.getElementById("eventType").value;

localStorage.setItem("event",event);
}

window.onload=function(){

let event=
localStorage.getItem("event");

if(event){
document.getElementById("eventType").value=
event;
}

}

function clearPref(){

localStorage.clear();

sessionStorage.clear();

}

</script>

</body>
</html>
